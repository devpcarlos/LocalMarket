# ============================================================
#  docker-compose.sonar.yml
#  Solo para analisis de codigo con SonarQube
#  NO se sube a produccion - solo uso en desarrollo
# ============================================================
#
#  COMANDOS:
#  Levantar:  docker compose -f docker-compose.sonar.yml up -d
#  Bajar:     docker compose -f docker-compose.sonar.yml down
#  Ver logs:  docker logs sonarqube --follow
#
# ============================================================

services:

  sonar_db:
    image: postgres:15
    container_name: sonar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_pass_2024
    volumes:
      - sonar_postgresql:/var/lib/postgresql/data
    networks:
      - sonarnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonar_db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_pass_2024
      SONAR_CE_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms128m"
    ports:
      - "9500:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - sonarnet
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  sonar_postgresql:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  sonarnet:
    driver: bridge